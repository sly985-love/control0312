# ==============================================================================
# 文件路径: configs/optimizers.yml
# 描述: 宏观排程层寻优算法 (BO / GA) 的搜索边界与超参数
# 学术背景: 本层解决基于“连续轮作(Staggered Planting)”的 CEA 空间运筹学问题
# ==============================================================================

# --- 1. BO 黑盒寻优的连续探索空间边界 (Search Space Bounds) ---
# 上层优化算法将仅在这个 5 维空间内“掷飞镖”，寻找最优的排程架构
search_space:
  t_h_bounds: [7.0, 21.0]           # 动作1: 育苗区(高密度区)停留时长范围 (天)
  t_l_bounds: [7.0, 28.0]           # 动作2: 成株区(低密度区)停留时长范围 (天)
  rho_h_bounds: [80.0, 150.0]       # 动作3: 育苗区种植密度调控范围 (株/m^2)
  rho_l_bounds: [15.0, 40.0]        # 动作4: 成株区种植密度调控范围 (株/m^2)
  photoperiod_bounds: [12.0, 20.0]  # 动作5: 共享光周期时序调控范围 (小时/天)

# --- 2. 宏观生产硬约束与运筹学评估 (Operations Research Constraints) ---
# 核心逻辑: 优化必须建立在满足商业订单履约的前提下，否则最低能耗解即为“不生产”。
constraints:
  # 商业订单铁律 (Contractual Demand Constraint)
  # 基于 40尺集装箱 (40m2) 的极限估算。如果排程推导出的产能低于此值，将被算法直接废弃。
  target_daily_yield_kg: 3.5        # 硬约束: 集装箱每天必须稳态移出至少 3.5 kg 新鲜生菜  
   
  # 这里肯定还需要改！！！ 到底是成本最小化还是利益最大化!还是说在保持软约束的前提下实现利润最大化。

  fresh_weight_ratio: 0.05          # 生物学估算: 生菜干鲜比约为 5% (用于将仿真得出的干重折算为鲜重)
  
  # 惩罚项
  max_unfeasible_penalty: 999999.0  # 当排程组合引发面积解析死解或产能不达标时，直接返回给 BO 的极大惩罚值

# --- 3. 遗传算法对比基线参数 (Genetic Algorithm Baseline) ---
# 仅用于 [实验三：宏观排程层算法效率对比]
ga_params:
  pop_size: 20                      # 种群大小 (每一代有 20 个不同的排程方案在竞争)
  n_generations: 30                 # 迭代代数 (总评估次数将高达 20 * 30 = 600 次，用于对比 BO 的高效性)
  crossover_rate: 0.8               # 交叉(交配)概率
  mutation_rate: 0.1                # 基因突变概率，防止陷入局部最优