# ==============================================================================
# 文件路径: configs/envs/PFAL_dual.yml
# 描述: 40尺集装箱双区植物工厂物理、排程与系统维度配置文件
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. 核心维度定义 (Core Dimensions - 严格兼容底层打包逻辑)
# ------------------------------------------------------------------------------
nx: 13        
ny: 13        
nu: 6         
nd: 3         
dt: 600.      
n_days: 30    
start_day: 0
Np: 0

# ------------------------------------------------------------------------------
# 2. 初始状态数组与惩罚权重矩阵
# ------------------------------------------------------------------------------
x0: [0.00018, 0.00054, 0.00050, 0.00150, 0.0018, 23.0, 0.015, 20.0, 25.0, 1.0, 20.15, 0.00072, 0.012]
u0: [0., 0., 0., 0., 0., 0.]

lb_pen_w: [0., 0., 0., 0., 100000., 10., 10000., 0., 0., 0., 0., 0., 0.]
ub_pen_w: [0., 0., 0., 0., 100000., 10., 10000., 0., 0., 0., 0., 0., 0.]

# ------------------------------------------------------------------------------
# 3. 物理约束边界 (Physical Constraints)
# ------------------------------------------------------------------------------
constraints:
  light_h_min: 0.0              
  light_h_max: 100.0            
  light_l_min: 0.0              
  light_l_max: 100.0            
  co2_supply_min: 0.0           
  co2_supply_max: 0.00000416    
  dehum_min: 0.0                
  dehum_max: 0.0000208          
  heat_min: -212.0              
  heat_max: 212.0               
  vent_min: 0.0                 
  vent_max: 0.0104              

  co2_min: 800.                 
  co2_max: 1200.                
  temp_min: 18.                 
  temp_max: 25.                 
  hum_min: 0.7                   
  hum_max: 0.8                   
  
# ------------------------------------------------------------------------------
# 4. 集装箱基建与排程参数 (Container & Scheduling Parameters)
# ------------------------------------------------------------------------------
geometry:
  total_growing_area: 40.0      
  volume: 67.0                  
  surface_area: 70.0            
  u_value: 0.5                  

scheduling:
  t_h_days: 15                  
  t_l_days: 15                  
  rho_h: 100.0                  
  rho_l: 25.0                   
  photoperiod_hours: 16.0       

biology:
  enable_shock: true            
  shock_depth: 0.8              
  shock_depth_k1: 1500.0        
  recovery_tau_k2: 120.0        
  enable_density_shading: true  
  base_k_extinction: 0.75       
  lai_max_h: 4.5                
  lai_max_l: 3.0

# ------------------------------------------------------------------------------
# 5. 【新增修复】经济账本与能效参数分离配置 (Economics & Equipment Efficiencies)
# ------------------------------------------------------------------------------
economics:
  c_elec_flat: 0.6          # 基础平段电价 (RMB/kWh 或 USD/kWh)
  c_co2_price: 0.2          # CO2 气源成本 (RMB/kg)
  c_COP: 3.0                # 空调综合能效比 (Coefficient of Performance)
  c_dehum_eev: 3.0          # 除湿机能效 (kg/kWh, 每消耗1度电除湿3kg)
  fan_eff_const: 7.0785     # 通风换气扇的能效常数 (1000 * 0.0004719 * 15)
  tou_peak_ratio: 1.5       # 峰电段乘数 (相对于平段)
  tou_valley_ratio: 0.5     # 谷电段乘数 (相对于平段)

weather_file: "data/weather_TMY.csv"